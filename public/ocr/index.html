<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR 文字识别工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔍 OCR 文字识别工具</h1>
        <p class="subtitle">图片文字识别 · PDF 文字提取 · 二维码/条形码识别</p>

        <div class="func-tabs">
            <div class="func-tab active" data-func="image">图片 OCR</div>
            <div class="func-tab" data-func="pdf">PDF 提取</div>
            <div class="func-tab" data-func="qr">二维码识别</div>
        </div>

        <!-- 图片 OCR -->
        <div class="panel" id="panel-image">
            <h3>图片文字识别</h3>
            <div class="upload-area" id="imgUploadArea">
                <p>点击选择或拖拽图片到这里</p>
                <input type="file" id="imgFile" accept="image/*">
            </div>
            <img id="imgPreview" class="img-preview hidden">
            <div class="options">
                <label>语言：</label>
                <select id="ocrLang">
                    <option value="zh">中文</option>
                    <option value="en">英文</option>
                    <option value="zh+en">中英混合</option>
                </select>
            </div>
            <button id="btnOcr" class="btn-recognize">开始识别</button>
        </div>

        <!-- PDF 提取 -->
        <div class="panel hidden" id="panel-pdf">
            <h3>PDF 文字提取</h3>
            <div class="upload-area" id="pdfUploadArea">
                <p>点击选择或拖拽 PDF 到这里</p>
                <input type="file" id="pdfFile" accept="application/pdf">
            </div>
            <div class="options">
                <label>PDF 页数：</label>
                <span id="pdfPageCount">-</span>
            </div>
            <button id="btnPdfExtract" class="btn-recognize">提取文字</button>
        </div>

        <!-- 二维码识别 -->
        <div class="panel hidden" id="panel-qr">
            <h3>二维码/条形码识别</h3>
            <div class="upload-area" id="qrUploadArea">
                <p>点击选择或拖拽图片到这里</p>
                <input type="file" id="qrFile" accept="image/*">
            </div>
            <img id="qrPreview" class="img-preview hidden">
            <button id="btnQrDecode" class="btn-recognize">识别二维码</button>
        </div>

        <!-- 结果区 -->
        <div id="resultArea" class="result-area hidden">
            <div class="result-header">
                <h3>✅ 识别结果</h3>
                <button id="btnCopy" class="btn-copy">复制结果</button>
            </div>
            <textarea id="resultText" readonly></textarea>
        </div>

        <div id="loading" class="loading hidden"></div>
    </div>
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="app.js"></script>
</body>
</html>
